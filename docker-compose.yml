version: '3.8'

services:
  linkedin-poster:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: linkedin_auto_poster
    restart: unless-stopped
    
    # Mount the local data folder and environment secrets
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
    
    # Expose the web GUI on port 5000
    ports:
      - "5000:5000"

    # Environment variables
    environment:
      # Set your local timezone (e.g., Europe/Rome, America/New_York, etc.)
      # This ensures the scheduler matches your local time
      - TZ=Europe/Rome
      - WEB_PORT=5000
